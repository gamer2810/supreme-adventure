<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <style>
      .tag-control {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        min-height: 42px;
        cursor: text;
        background: #fff;
      }
      .tag-control:focus-within {
        border-color: #6c6f85;
        box-shadow: 0 0 0 2px rgba(108, 111, 133, 0.15);
      }
      .tag-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #e0e7ff;
        color: #3730a3;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 13px;
        line-height: 1.6;
        white-space: nowrap;
      }
      .tag-chip-remove {
        border: none;
        background: none;
        cursor: pointer;
        color: #6366f1;
        font-size: 15px;
        line-height: 1;
        padding: 0 0 0 2px;
        display: flex;
        align-items: center;
      }
      .tag-chip-remove:hover { color: #4338ca; }
      .tag-input {
        border: none;
        outline: none;
        min-width: 120px;
        flex: 1;
        font-size: 14px;
        padding: 2px 0;
        background: transparent;
      }
      .tag-hint {
        font-size: 11px;
        color: #888;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.3.3/dist/decap-cms.js"></script>
    <script>
      var POSTS_COLLECTION = 'blog';

      // Shared taxonomy state across all widget instances
      var _taxonomyCache = null;
      var _loadState = 'idle'; // 'idle' | 'loading' | 'done' | 'error'
      var _subscribers = [];

      function subscribe(fn) {
        _subscribers.push(fn);
        return function unsubscribe() {
          _subscribers = _subscribers.filter(function(f) { return f !== fn; });
        };
      }

      function notify() {
        _subscribers.forEach(function(fn) { fn(); });
      }

      // Extract categories and tags from Immutable.js entry list returned by getCollection
      function extractTaxonomy(entries) {
        var cats = {}, tags = {};
        entries.forEach(function(entry) {
          try {
            var data = entry.get('data');
            var c = data.get('categories');
            var t = data.get('tags');
            if (c && c.forEach) c.forEach(function(v) { if (v) cats[v] = true; });
            if (t && t.forEach) t.forEach(function(v) { if (v) tags[v] = true; });
          } catch (e) {}
        });
        return {
          categories: Object.keys(cats).sort(),
          tags: Object.keys(tags).sort()
        };
      }

      // Register a preview template for the blog collection.
      // getCollection is only available as a prop here — this is the DecapCMS-native
      // way to read all entries. The preview pane renders automatically when a post
      // is open, so taxonomy loads without any manual trigger.
      var BlogPreviewTemplate = createClass({
        componentDidMount: function() {
          if (_loadState !== 'idle') return;
          _loadState = 'loading';
          notify();
          this.props.getCollection(POSTS_COLLECTION)
            .then(function(entries) {
              _taxonomyCache = extractTaxonomy(entries);
              _loadState = 'done';
              notify();
            })
            .catch(function() {
              _loadState = 'error';
              notify();
            });
        },
        render: function() {
          var h = window.h;
          var entry = this.props.entry;
          return h('div', { style: { fontFamily: 'sans-serif', padding: '1rem' } },
            h('h1', { style: { fontSize: '1.5rem', marginBottom: '0.5rem' } },
              entry.getIn(['data', 'title'])
            ),
            this.props.widgetFor('body')
          );
        }
      });

      CMS.registerPreviewTemplate(POSTS_COLLECTION, BlogPreviewTemplate);

      // ── Helpers ──────────────────────────────────────────────────────────────

      function toArray(val) {
        if (!val) return [];
        if (typeof val.toJS === 'function') return val.toJS();
        if (typeof val.toArray === 'function') return val.toArray();
        if (Array.isArray(val)) return val;
        return [];
      }

      function makeList(arr) {
        if (window.Immutable && window.Immutable.List) {
          return window.Immutable.List(arr);
        }
        return arr;
      }

      // ── Tag autocomplete widget ───────────────────────────────────────────────

      var TagControl = createClass({
        getInitialState: function() {
          return { inputValue: '', suggestions: [] };
        },

        componentDidMount: function() {
          var self = this;
          var fieldName = self.props.field.get('name');

          // Apply immediately if taxonomy already loaded (e.g. second widget mount)
          if (_loadState === 'done' && _taxonomyCache) {
            self.setState({ suggestions: _taxonomyCache[fieldName] || [] });
          }

          // Subscribe so all widget instances update together when load completes
          this._unsubscribe = subscribe(function() {
            if (_loadState === 'done' && _taxonomyCache) {
              self.setState({ suggestions: _taxonomyCache[fieldName] || [] });
            }
            self.forceUpdate();
          });
        },

        componentWillUnmount: function() {
          if (this._unsubscribe) this._unsubscribe();
        },

        addTag: function(raw) {
          var tag = raw.trim().replace(/,+$/, '').trim();
          if (!tag) return;
          var current = toArray(this.props.value);
          if (!current.includes(tag)) {
            this.props.onChange(makeList(current.concat([tag])));
            if (!this.state.suggestions.includes(tag)) {
              this.setState({ suggestions: this.state.suggestions.concat([tag]).sort() });
            }
          }
          this.setState({ inputValue: '' });
        },

        removeTag: function(tag) {
          var current = toArray(this.props.value);
          this.props.onChange(makeList(current.filter(function(t) { return t !== tag; })));
        },

        handleKeyDown: function(e) {
          var val = this.state.inputValue;
          if ((e.key === 'Enter' || e.key === ',') && val.trim()) {
            e.preventDefault();
            this.addTag(val);
          } else if (e.key === 'Backspace' && !val) {
            var current = toArray(this.props.value);
            if (current.length) {
              this.props.onChange(makeList(current.slice(0, -1)));
            }
          }
        },

        handleChange: function(e) {
          var val = e.target.value;
          if (val.endsWith(',')) {
            this.addTag(val.slice(0, -1));
          } else {
            this.setState({ inputValue: val });
          }
        },

        handleBlur: function() {
          if (this.state.inputValue.trim()) {
            this.addTag(this.state.inputValue);
          }
        },

        render: function() {
          var h = window.h;
          var self = this;
          var current = toArray(this.props.value);
          var fieldName = this.props.field.get('name');
          var listId = 'tag-suggestions-' + fieldName;

          var hint =
            _loadState === 'loading' ? 'Loading suggestions from posts…' :
            _loadState === 'error'   ? 'Could not load suggestions.' :
            _loadState === 'done'    ? 'Press Enter or comma to add. Suggestions from existing posts.' :
                                       'Press Enter or comma to add a tag.';

          return h('div', null,
            h('div', {
              className: 'tag-control',
              onClick: function() { self.inputRef && self.inputRef.focus(); }
            },
              current.map(function(tag) {
                return h('span', { key: tag, className: 'tag-chip' },
                  tag,
                  h('button', {
                    type: 'button',
                    className: 'tag-chip-remove',
                    title: 'Remove',
                    onClick: function(e) { e.stopPropagation(); self.removeTag(tag); }
                  }, '×')
                );
              }),
              h('input', {
                list: listId,
                className: 'tag-input',
                value: this.state.inputValue,
                placeholder: current.length ? '' : 'Type and press Enter or comma…',
                ref: function(el) { self.inputRef = el; },
                onChange: this.handleChange,
                onKeyDown: this.handleKeyDown,
                onBlur: this.handleBlur
              }),
              h('datalist', { id: listId },
                this.state.suggestions
                  .filter(function(s) { return !current.includes(s); })
                  .map(function(s) { return h('option', { key: s, value: s }); })
              )
            ),
            h('p', { className: 'tag-hint' }, hint)
          );
        }
      });

      var TagPreview = createClass({
        render: function() {
          var h = window.h;
          var value = toArray(this.props.value);
          return h('div', null, value.join(', '));
        }
      });

      CMS.registerWidget('tag-autocomplete', TagControl, TagPreview);
    </script>
  </body>
</html>
